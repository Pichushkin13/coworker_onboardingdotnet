<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training Library</title>
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg-shape"></div>
  <section id="authGate" class="auth-gate-page">
    <div class="auth-card">
      <h1>Training Library</h1>
      <p>Войдите, чтобы проходить курсы и сохранять черновики ответов до submit.</p>
      <input id="gateEmail" placeholder="email или admin" autocomplete="username" />
      <input id="gateName" placeholder="display name для регистрации" autocomplete="name" />
      <input id="gatePass" placeholder="password" type="password" autocomplete="current-password" />
      <div class="auth-actions">
        <button id="gateLogin">Войти</button>
        <button id="gateRegister">Регистрация</button>
        <button id="gateWindows">Windows</button>
      </div>
      <p id="gateMsg"></p>
    </div>
  </section>

  <header id="appHeader" class="top hidden">
    <h1>Training Library</h1>
    <div class="top-actions">
      <span id="pythonStatus" class="runtime-status"></span>
      <span id="authStatus" class="runtime-status"></span>
      <button id="authBtn">Выйти</button>
    </div>
  </header>

  <main id="appShell" class="layout hidden">
    <aside class="panel" id="courses"></aside>
    <section class="panel" id="content"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
  <script src="/app.js"></script>
</body>
</html>

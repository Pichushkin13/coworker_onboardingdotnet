<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training Library</title>
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg-shape"></div>
  <section id="authGate" class="auth-gate-page">
    <div class="auth-card">
      <div class="training-logo" aria-hidden="true">
        <span>TL</span>
      </div>
      <h1>Training Lab</h1>
      <p>Sign in to continue your onboarding.</p>
      <label>
        <span>Login</span>
        <input id="gateEmail" placeholder="admin or user@email.com" autocomplete="username" />
      </label>
      <label>
        <span>Password</span>
        <input id="gatePass" placeholder="password" type="password" autocomplete="current-password" />
      </label>
      <div class="auth-actions">
        <button id="gateLogin">Войти</button>
      </div>
      <p id="gateMsg"></p>
    </div>
  </section>

  <header id="appHeader" class="top hidden" hidden>
    <h1>Training Library</h1>
    <div class="top-actions">
      <span id="pythonStatus" class="runtime-status"></span>
      <span id="authStatus" class="runtime-status"></span>
      <button id="authBtn">Выйти</button>
    </div>
  </header>

  <main id="appShell" class="layout hidden" hidden>
    <aside class="panel" id="courses"></aside>
    <section class="panel" id="content"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
  <script src="/app.js"></script>
</body>
</html>
